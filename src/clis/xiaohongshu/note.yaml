site: xiaohongshu
name: note
description: "小红书笔记详情"
domain: www.xiaohongshu.com
strategy: intercept
browser: true

args:
  id:
    type: str
    required: true
    description: Note ID

columns: [title, author, likes, collects, comments, type, time, desc]

pipeline:
  - navigate: https://www.xiaohongshu.com/explore/${{ args.id }}
  - wait: 3
  - tap:
      store: note
      action: fetchNoteData
      capture: v1/note/feed
      timeout: 8
  - evaluate: |
      (() => {
        const app = document.querySelector('#app')?.__vue_app__;
        const pinia = app?.config?.globalProperties?.$pinia;
        if (!pinia?._s) return { error: 'Page not ready' };
        const noteStore = pinia._s.get('note');
        if (!noteStore) return { error: 'Note store not found' };
        const state = noteStore.$state || {};
        const notes = state.noteMap || state.noteDetailMap || {};
        const n = Object.values(notes)[0] || {};
        const nc = n.noteCard || n.note_card || n;
        return [{
          title: nc.title || nc.displayTitle || nc.display_title || '',
          author: nc.user?.nickname || nc.user?.name || '',
          likes: nc.interactInfo?.likedCount || nc.interact_info?.liked_count || 0,
          collects: nc.interactInfo?.collectedCount || nc.interact_info?.collected_count || 0,
          comments: nc.interactInfo?.commentCount || nc.interact_info?.comment_count || 0,
          type: nc.type || '',
          time: nc.time ? new Date(nc.time).toISOString().slice(0, 10) : (nc.createTime || ''),
          desc: (nc.desc || '').slice(0, 200),
        }];
      })()
